<!DOCTYPE html>
<html>
<head>
<title>Chat System</title>
</head>

<body>

<h2>Chat System</h2>

<div id="messages"></div>

<input type="text" id="message">

<button onclick="sendMessage()">
Send
</button>

<script>

function sendMessage(){

let msg =
document.getElementById("message").value;

let box =
document.getElementById("messages");

box.innerHTML +=
"<p>" + msg + "</p>";

document.getElementById("message").value = "";

}

</script>

</body>
</html>
